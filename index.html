<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модальное окно</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="open-btn">Модальное окно</button>

    <div class="container">
        <div class="modal">
            <div class="modal_header">
                <span>Logo</span>
                <img src="Krestiksvgpng.ru_.svg" class="close-btn">
            </div>
            <form class="modal_form">
                <input type="text" class="modal_name" placeholder="Имя">
                <input type="text" class="modal_surname" placeholder="Фамилия">
                <button class="modal_button" disabled>Отправить</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
